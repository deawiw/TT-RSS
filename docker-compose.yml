services:
  db:
    image: postgres:17-alpine
    container_name: tt-rss-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tt_rss_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  tt-rss:
    image: nventiveux/ttrss:v2026.02.07
    container_name: tt-rss-app
    restart: unless-stopped
    environment:
      # Подключение TT-RSS к отдельной базе PostgreSQL.
      TTRSS_DB_TYPE: pgsql
      TTRSS_DB_HOST: db
      TTRSS_DB_PORT: 5432
      TTRSS_DB_NAME: ${POSTGRES_DB}
      TTRSS_DB_USER: ${POSTGRES_USER}
      TTRSS_DB_PASS: ${POSTGRES_PASSWORD}
      # Внешний URL нужен TT-RSS для корректной генерации ссылок.
      TTRSS_SELF_URL_PATH: ${TTRSS_SELF_URL_PATH}
      # Пароль встроенного администратора задается явно для первого входа.
      ADMIN_USER_PASS: ${TTRSS_ADMIN_PASSWORD}
    ports:
      - "${TTRSS_HTTP_PORT}:80"
    volumes:
      - tt_rss_app_data:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  etl:
    image: kirillmalakhiev/tt-rss-etl:latest
    container_name: tt-rss-etl
    restart: unless-stopped
    env_file:
      - .env.etl
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      TTRSS_BASE_URL: http://tt-rss:80
    depends_on:
      db:
        condition: service_healthy

  shiny:
    image: kirillmalakhiev/tt-rss-shiny:latest
    container_name: tt-rss-shiny
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: news_analytics
      DB_USER: ttrss
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "3838:3838"
    depends_on:
      db:
        condition: service_healthy

  mcp:
    image: kirillmalakhiev/tt-rss-mcp:latest
    container_name: tt-rss-mcp
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: news_analytics
      DB_USER: ttrss
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CLOUD_RU_API_KEY: ${CLOUD_RU_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  tt_rss_db_data:
  tt_rss_app_data:
